<div id="disqus_thread">
  <button type="button" id="disqus_load" class="disqus-load-btn">Mostra commenti</button>
</div>
<script>
  (function () {
    var btn = document.getElementById('disqus_load');
    var thread = document.getElementById('disqus_thread');
    if (!btn || !thread) return;
    var loaded = false;

    function hasConsent() {
      return typeof CookieConsent !== 'undefined'
        && CookieConsent.acceptedCategory
        && CookieConsent.acceptedCategory('comments');
    }

    function loadDisqus() {
      if (loaded) return;
      loaded = true;
      if (btn.parentNode) btn.remove();
      window.disqus_config = function () {
        this.page.url = {{ page.url | absolute_url | jsonify }};
        this.page.identifier = {{ page.url | jsonify }};
      };
      var s = document.createElement('script');
      s.src = 'https://francescolavella-it.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (document.head || document.body).appendChild(s);
    }

    btn.addEventListener('click', function () {
      if (hasConsent()) {
        loadDisqus();
      } else if (typeof CookieConsent !== 'undefined' && CookieConsent.showPreferences) {
        CookieConsent.showPreferences();
      } else {
        loadDisqus();
      }
    });

    window.addEventListener('cc:onConsent', function () { if (hasConsent()) loadDisqus(); });
    window.addEventListener('cc:onChange',  function () { if (hasConsent()) loadDisqus(); });

    if (hasConsent() && 'IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { loadDisqus(); io.disconnect(); }
        });
      }, { rootMargin: '400px' });
      io.observe(thread);
    }
  })();
</script>
<noscript>Per visualizzare i commenti, attiva JavaScript. <a href="https://disqus.com/?ref_noscript" rel="noopener noreferrer">Powered by Disqus.</a></noscript>
