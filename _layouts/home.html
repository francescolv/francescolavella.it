<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    <script defer src="{{ '/assets/js/menu.js' | relative_url }}"></script>
    <div class="menu-toggle">
      <i class="fa fa-bars" aria-hidden="true"></i>
    </div>
    <div class="menu-drawer">
      {% include nav-home.html %}
    </div>
    <div class="home-title">
      {{ site.title }}
    </div>
    <div class="home-hero">
      <div class="home-wrap">
        <div class="home-photo">
          <picture>
            <source type="image/webp"
                    srcset="{{ '/assets/img/profile-300.webp' | relative_url }} 1x,
                            {{ '/assets/img/profile-600.webp' | relative_url }} 2x">
            <img alt="{{ site.title }}"
                 src="{{ '/assets/img/profile-300.jpg' | relative_url }}"
                 srcset="{{ '/assets/img/profile-300.jpg' | relative_url }} 1x,
                         {{ '/assets/img/profile-600.jpg' | relative_url }} 2x"
                 width="300" height="300" decoding="async" fetchpriority="high">
          </picture>
        </div>
        <div class="desktop-only">
          {% include nav-home.html %}
        </div>
        <div class="home-desc">
          {{ site.description }}
        </div>
      </div>
    </div>
    {% include social-links.html %}
  </body>
</html>
